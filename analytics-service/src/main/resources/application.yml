spring:
  application:
    name: analytics-service
  data:
    mongodb:
      uri: ${SPRING_DATA_MONGODB_URI:mongodb://localhost:27017/taskboard}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

server:
  port: 8083


security:
  jwt:
    secret: c3VwZXItc2VjcmV0LWtleS10aGF0LWlzLWF0LWxlYXN0LTMyLWJ5dGVz
    expiration-seconds: 3600

services:
  auth:
    base-url: ${SPRING_AUTH_URI:http://localhost:8081}

management:
  info:
    env:
      enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    prometheus:
      enabled: true
info:
  app:
    name: analytics-service
    version: 0.0.1-SNAPSHOT
    description: Taskboard analytics microservice backend