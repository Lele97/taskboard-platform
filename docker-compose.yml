version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: taskboard-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  gateway-service:
    build:
      context: .
      dockerfile: gateway-service/Dockerfile
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      - SERVICES_AUTH_BASE_URL=http://auth-service:8081
      - SERVICES_PROJECT_BASE_URL=http://project-service:8082
      - SERVICES_ANALYTICS_BASE_URL=http://analytics-service:8083

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/taskboard-auth
    depends_on:
      - mongodb

  project-service:
    build:
      context: .
      dockerfile: project-service/Dockerfile
    container_name: project-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/taskboard-project
    depends_on:
      - mongodb

  analytics-service:
    build:
      context: .
      dockerfile: analytics-service/Dockerfile
    container_name: analytics-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/taskboard-analytics
    depends_on:
      - mongodb

      
volumes:
  mongo-data:
