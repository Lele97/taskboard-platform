services:
  mongodb:
    image: mongo:latest
    container_name: taskboard-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - taskboard-network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: gateway-runtime
    container_name: gateway-service
    ports:
      - "8080:8080"
    environment:
      - SERVICES_AUTH_BASE_URL=http://auth-service:8081
      - SERVICES_PROJECT_BASE_URL=http://project-service:8082
      - SERVICES_ANALYTICS_BASE_URL=http://analytics-service:8083
    depends_on:
      mongodb:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      project-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
    networks:
      - taskboard-network
    restart: unless-stopped

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: auth-runtime
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/taskboard-auth
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - taskboard-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8081/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  project-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: project-runtime
    container_name: project-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/taskboard-project
      - SERVICES_AUTH_BASE_URL=http://auth-service:8081
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - taskboard-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8082/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  analytics-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: analytics-runtime
    container_name: analytics-service
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATA_MONGODB_URI=mongodb://mongodb:27017/taskboard-analytics
      - SERVICES_AUTH_BASE_URL=http://auth-service:8081
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - taskboard-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8083/actuator/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  prometheus:
    image: prom/prometheus:v2.44.0
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    restart: unless-stopped
    networks:
      - taskboard-network

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped
    networks:
      - taskboard-network

networks:
  taskboard-network:
    driver: bridge
    name: taskboard-network

volumes:
  mongo-data:
  grafana-data: